<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO-DO List App</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <h1>TO-DO LIST</h1>
      <p>Add, edit, and manage your task easily</p>
    </header>
    <div id="container">
      <form id="task-form">
        <input type="text" name="" id="task-input" required placeholder="Enter a new task...." />
        <button type="submit">+ Add Task</button>
      </form>
      <ul id="task-list"></ul>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
